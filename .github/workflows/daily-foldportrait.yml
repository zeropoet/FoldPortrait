name: Daily FoldPortrait

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - name: Check out FoldPortrait
        uses: actions/checkout@v4
        with:
          path: FoldPortrait

      - name: Check out FoldKernel
        uses: actions/checkout@v4
        with:
          repository: zeropoet/FoldKernel
          path: FoldKernel

      - name: Show Swift version
        run: swift --version

      - name: Test
        working-directory: FoldPortrait
        run: swift test

      - name: Generate next portrait
        working-directory: FoldPortrait
        run: swift run fold-portrait "zero poet"

      - name: Commit generated portrait
        working-directory: FoldPortrait
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Output/iterations README.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          iteration="$(git diff --cached --name-only | sed -n 's|Output/iterations/foldportrait-\(v[0-9][0-9][0-9][0-9]\)-.*|\1|p' | sort -u | tail -n 1)"
          if [ -z "$iteration" ]; then
            iteration="$(TZ=America/New_York date +%Y-%m-%d)"
          fi
          git commit -m "Generate FoldPortrait ${iteration}"
          git push
